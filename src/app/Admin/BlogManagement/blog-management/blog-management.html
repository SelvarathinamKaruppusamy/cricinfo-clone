<div class="blog-management-container">
  <div class="header">
    <h2>Blog Management</h2>

    <div class="header-actions">
      <div class="search-box">
        <span class="material-symbols-outlined">search</span>

        <input
          type="text"
          placeholder="Search blogs..."
          [(ngModel)]="searchText"
          (input)="onSearch()"
        />
      </div>

      <button class="add-btn" (click)="addBlog()">
        <span class="material-symbols-outlined">add_circle</span>
        Add Blog
      </button>
    </div>
  </div>

  <div *ngIf="loading">
    <p>Loading blogs...</p>
  </div>

  <table class="blog-table" *ngIf="!loading">
    <thead>
      <tr>
        <th>Image</th>
        <th>Title</th>
        <th>Category</th>
        <th>Author</th>
        <th>Published</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let blog of filteredBlogs; trackBy: trackByBlogId">
        <td>
          <img [ngSrc]="blog.image" width="100" height="60" [alt]="blog.title" class="blog-image" />
        </td>

        <td [innerHTML]="blog.title | highlight: searchText"></td>

        <td>{{ blog.category }}</td>

        <td>{{ blog.author }}</td>

        <td>{{ blog.publishedDate }}</td>

        <td>
          <button class="edit-btn" (click)="editBlog(blog.matchId)">Edit</button>

          <button class="delete-btn" (click)="deleteBlog(blog.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Delete Popup -->
  <div class="delete-overlay" *ngIf="showDeletePopup" (click)="onOverlayClick($event)">
    <div class="delete-popup">
      <div class="popup-header">
        <h3>Delete Blog</h3>
        <button class="close-btn" (click)="cancelDelete()">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="popup-body">
        <p>You're going to delete your</p>
        <div class="blog-name">"{{ selectedBlogTitle }}"</div>
      </div>

      <div class="popup-actions">
        <button class="btn btn-secondary" (click)="cancelDelete()">No, keep it</button>
        <button class="btn btn-danger" (click)="confirmDelete()">Yes, Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" *ngIf="toastVisible" [ngClass]="toastType">
    <div class="toast-icon">
      <span *ngIf="toastType === 'success'">✓</span>
      <span *ngIf="toastType === 'error'">✕</span>
    </div>

    <div class="toast-content">
      <div class="toast-title">
        {{ toastType === 'success' ? 'Success' : 'Error' }}
      </div>
      <div class="toast-message">{{ toastMessage }}</div>
    </div>

    <button class="toast-close" (click)="closeToast()">×</button>

    <div class="toast-progress"></div>
  </div>
</div>
