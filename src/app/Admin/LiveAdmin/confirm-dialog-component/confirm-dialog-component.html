<div class="fixed inset-0 bg-black/2 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-slate-200 rounded-xl min-w-[320px] max-w-[420px] border border-white/90 shadow-2xl">
    <!-- Header -->
    <div class="px-5 py-4">
      <h2 class="text-lg font-semibold text-black">{{ data.title }}</h2>
    </div>

    <!-- Content -->
    <div class="px-5 py-2">
      <p class="text-sm text-black leading-6">
        {{ data.message }}
      </p>
    </div>

    <!-- Actions -->
    <div class="px-5 py-4 flex justify-end gap-2">
      <button
        class="bg-transparent text-gray-700 border border-slate-400 hover:bg-black/5 px-6 py-2 rounded-lg text-sm font-semibold transition-all duration-150 min-h-[38px] min-w-[80px]"
        (click)="cancel()"
      >
        {{ data.cancelText || 'Cancel' }}
      </button>

      <button
        class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition-all duration-150 min-h-[38px] min-w-[80px] shadow-sm hover:shadow-md"
        (click)="confirm()"
      >
        {{ data.confirmText || 'Confirm' }}
      </button>
    </div>
  </div>
</div>
