<h2 mat-dialog-title>Select Next Bowler</h2>

<mat-dialog-content>

  <div
    *ngFor="let bowler of data.bowlers"
    class="border rounded-lg p-3 mb-2 cursor-pointer hover:bg-green-200"
    (click)="select(bowler.index)"
  >

    <div class="font-semibold">
      {{bowler.name}}
    </div>

    <div class="text-sm text-slate-500">
      {{bowler.overs}} Overs
    </div>

  </div>

</mat-dialog-content>
