<div class="completed-container">

  @for (match of matches; track match.matchNo) {

    <div class="match-card">

      <div class="header">

        <div class="match-info">
          Match {{ match.matchNo }}
        </div>

        <div class="date">
          {{ match.date }}
        </div>

      </div>

      <div class="content">

        @for (team of match.teams; track team.teamId) {

          <div class="team-row">

            <div class="team-info">

              <img
                [src]="team.logo"
                [alt]="team.shortName">

              <span>
                {{ team.shortName }}
              </span>

            </div>

            <strong>
              {{ team.scores }}
              ({{ team.overs }})
            </strong>

          </div>

        }

      </div>

      <div class="result">
        {{ match.result }}
      </div>

      <div class="potm">
        🏆 {{ match.playerOfTheMatch }}
      </div>

      <div class="footer">

        <div class="venue">
          📍 {{ match.venue }}
        </div>

        <button
          (click)="openScorecard(match.matchNo)">
          Scorecard
        </button>

      </div>

    </div>

  }

</div>
