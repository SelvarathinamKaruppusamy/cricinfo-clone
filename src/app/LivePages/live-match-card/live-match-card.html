@if (live) {
  <div class="flex p-4 items-center bg-slate-50 font-sans" (click)="movetolivepage()">
    <mat-card
      class="w-full max-w-lg !bg-white rounded-2xl overflow-hidden shadow-md border border-slate-200"
    >
      <div
        class="bg-slate-100 px-4 py-2.5 border-b border-slate-200 flex justify-between items-center text-xs"
      >
        <span class="font-bold text-slate-500 uppercase tracking-wider">
          IPL 2026 • Match {{ live.matchNo }}
        </span>
        <div
          class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-red-50 text-red-600 font-bold border border-red-200 text-[11px]"
        >
          <span class="h-1.5 w-1.5 rounded-full bg-red-500 animate-pulse"></span>
          LIVE
        </div>
      </div>

      <div class="p-4 grid grid-cols-7 items-center bg-white gap-2">
        <div
          class="col-span-3 flex flex-col items-center text-center p-2 rounded-xl bg-slate-50/50 border border-slate-100"
        >
          <img [src]="live.teams[0].logo" class="w-10 h-10 object-contain mb-1" alt="Logo" />
          <h3 class="font-bold text-sm text-slate-900">{{ live.teams[0].shortName }}</h3>
          <span
            class="text-[10px] font-medium text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded mt-1"
            >Yet to bat</span
          >
        </div>

        <div class="col-span-1 text-center font-black text-xs text-slate-400">VS</div>

        <div
          class="col-span-3 flex flex-col items-center text-center p-2 rounded-xl bg-slate-50/50 border border-slate-100"
        >
          <img [src]="live.teams[1].logo" class="w-10 h-10 object-contain mb-1" alt="Logo" />
          <h3 class="font-bold text-sm text-slate-900">{{ live.teams[1].shortName }}</h3>
          <span
            class="text-[10px] font-medium text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded mt-1"
            >Yet to bat</span
          >
        </div>
      </div>

      <div
        class="bg-slate-800 px-4 py-2 text-[11px] text-slate-300 flex justify-between items-center"
      >
        <div class="flex items-center gap-1 truncate max-w-[280px]">
          <mat-icon class="!text-xs text-slate-400">location_on</mat-icon>
          <span class="truncate font-medium">{{ live.venue }}, {{ live.city }}</span>
        </div>

        <div
          class="flex items-center gap-1 font-semibold text-slate-400 uppercase tracking-wider text-[9px]"
        >
          <mat-icon class="!text-xs text-amber-400">sports_cricket</mat-icon>
          T20
        </div>
      </div>
    </mat-card>
  </div>
}
