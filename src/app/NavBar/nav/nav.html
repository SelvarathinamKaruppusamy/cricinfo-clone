<mat-toolbar color="primary" class="navbar">
  <mat-icon>sports_cricket</mat-icon>

  <span class="logo"> CricInfo</span>

  <span class="spacer"></span>

  @for (item of items; track item.route) {
    <a
      mat-button
      class="!text-white"
      (click)="getMethod(item.route)"
      [class.active-link]="activateRoute === item.route">
      {{ item.label }}
    </a>
  }

  <!-- STATS DROPDOWN -->

  <button
    mat-button
    class="!text-white"
    [matMenuTriggerFor]="statsMenu">

    Stats

    <mat-icon>arrow_drop_down</mat-icon>

  </button>

  <mat-menu #statsMenu="matMenu">

    <button
      mat-menu-item
      (click)="getMethod('/stats/overall')">

      Overall Stats

    </button>

    <button
      mat-menu-item
      (click)="getMethod('/stats/purple')">

      Purple Cap

    </button>

    <button
      mat-menu-item
      (click)="getMethod('/stats/orange')">

      Orange Cap

    </button>

  </mat-menu>

</mat-toolbar>
