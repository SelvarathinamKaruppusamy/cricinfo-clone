<div class="card mt-17">
   @for (card of cards; track card.id) 
   { 
    <div class="match-card" (click)="open(card.id)">
       <div class="header"> <span class="header-font">
        {{ card.status|uppercase }}</span> 
        <div class="right-info"> 
          <span class="status"> IPL T20 </span> 
          <div class="upcom"></div> <span class="status">
            {{card.city}}
          </span>
         </div>
         </div> 
         <div class="team-upd"> 
          <div>
             <div class="team"> 
              <img [src]="card.team1.logo" class="image" /> 
              <span>{{ card.team1.shortName }}</span> 
            </div> 
            <div class="team">
               <img [src]="card.team2.logo" class="image" /> 
               <span>{{ card.team2.shortName }}</span>
               </div> 
              </div>
               <div class="place"> 
                <span>{{ formatDate(card.date)|date:'dd MMM yyyy'}}</span> 
                <div class="team">
                   <h4>{{ card.time }}</h4>
                   </div> 
                  </div> 
                </div> 
                <div class="footer">
                   <div class="header"> 
                    <span class="venue" (click)="schedulepage($event,card.matchNo)">Schedule</span>
                     <span class="venue"> {{ card.stadium }} </span> 
                    </div> 
                  </div> 
                </div> 
              } 
            </div>
