<div class="login-box">

  <h2>Admin Login</h2>

  <input
    type="text"
    placeholder="Username"
    [(ngModel)]="username"
    name="name">

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
    name="password">

  <button (click)="login()">
    Login
  </button>

</div>
